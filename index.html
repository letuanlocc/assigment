<!DOCTYPE html>
<html lang="vi">
    <head>
        <link rel="stylesheet" href="style.css">
        <Tittle>Quan ly phong</Tittle>
        <script src="script.js"></script>
    </head>
    <body>
        <div class="header">
            <h2>Quan ly phong</h2>
            <div class="btn-group">
                <button class="btn btn-red">Hiển Thị</button>
                <button class="btn btn-orange">Thêm mới phòng</button>
            </div>
        </div>

        <div class="form-container">
            <div class="input-group">
                <label>Tên phòng</label>
                <input type="text" placeholder="Tên phòng">
            </div>

            <div class="input-group">
                <label>Mô tả phòng</label>
                <input type="text" placeholder="Mô tả phòng">
            </div>

            <div class="input-group">
                <label>Giá</label>
                <input type="text" placeholder="Giá phòng">
            </div>

            <div class="image-picker">
                <span>Chọn hình ảnh</span>
            </div>
        </div>
    </body>
</html>
